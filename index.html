<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京单场数据中心</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
/* ==================== CSS Variables ==================== */
:root {
    --primary-900: #0a1628;
    --primary-800: #0f2240;
    --primary-700: #152d52;
    --primary-600: #1a3a6b;
    --primary-500: #1e4785;
    --accent-gold: #f0b429;
    --accent-gold-light: #f7d070;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-400: #94a3b8;
    --gray-500: #64748b;
    --gray-600: #475569;
    --gray-700: #334155;
    --gray-800: #1e293b;
    --gray-900: #0f172a;
    --bg-main: #f0f4f8;
    --bg-card: #ffffff;
    --bg-glass: rgba(255, 255, 255, 0.85);
    --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
    --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 24px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-main);
    color: var(--gray-800);
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
}

.container { max-width: 1400px; margin: 0 auto; padding: 0 24px; }

/* ==================== Background ==================== */
.bg-decoration { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
.circle { position: absolute; border-radius: 50%; background: linear-gradient(135deg, var(--primary-500), var(--accent-gold)); opacity: 0.03; }
.circle-1 { width: 600px; height: 600px; top: -200px; right: -100px; animation: float 20s ease-in-out infinite; }
.circle-2 { width: 400px; height: 400px; bottom: -100px; left: -50px; animation: float 15s ease-in-out infinite reverse; }
.circle-3 { width: 300px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); animation: float 25s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0) rotate(0deg)} 33%{transform:translateY(-20px) rotate(5deg)} 66%{transform:translateY(10px) rotate(-3deg)} }

/* ==================== Header ==================== */
.header {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg-glass);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.2);
    box-shadow: var(--shadow-sm);
}
.header-content { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; }
.logo { display: flex; align-items: center; gap: 12px; }
.logo-icon { font-size: 36px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2)); }
.logo-text h1 {
    font-size: 24px; font-weight: 700;
    background: linear-gradient(135deg, var(--primary-700), var(--primary-500));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    line-height: 1.2;
}
.logo-text .subtitle { font-size: 12px; color: var(--gray-500); letter-spacing: 1px; }
.header-status {
    display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray-600);
    background: var(--bg-card); padding: 8px 16px; border-radius: var(--radius-xl); box-shadow: var(--shadow-sm);
}
.status-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(1.2)} }

/* ==================== Stats ==================== */
.stats-section { margin: 24px 0; }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
.stat-card {
    background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px;
    display: flex; align-items: center; gap: 16px;
    box-shadow: var(--shadow-md); transition: var(--transition); border: 1px solid transparent;
}
.stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); border-color: var(--accent-gold-light); }
.stat-icon {
    font-size: 32px; width: 56px; height: 56px; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, var(--primary-700), var(--primary-500));
    border-radius: var(--radius-md); box-shadow: 0 4px 12px rgba(30,71,133,0.3);
}
.stat-info { display: flex; flex-direction: column; }
.stat-value { font-size: 28px; font-weight: 700; color: var(--gray-900); line-height: 1.2; }
.stat-label { font-size: 13px; color: var(--gray-500); margin-top: 2px; }

/* ==================== Tabs ==================== */
.tabs-section { margin: 24px 0; }
.tabs-container {
    background: var(--bg-card); border-radius: var(--radius-lg); padding: 8px;
    box-shadow: var(--shadow-md); overflow-x: auto; -webkit-overflow-scrolling: touch;
}
.tabs-wrapper { display: flex; gap: 8px; min-width: max-content; }
.tab {
    display: flex; align-items: center; gap: 8px; padding: 12px 20px; border: none;
    background: transparent; border-radius: var(--radius-md); cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--gray-600); transition: var(--transition); white-space: nowrap;
}
.tab:hover { background: var(--gray-100); color: var(--gray-800); }
.tab.active {
    background: linear-gradient(135deg, var(--primary-700), var(--primary-500));
    color: white; box-shadow: 0 4px 12px rgba(30,71,133,0.3);
}
.tab-icon { font-size: 16px; }

/* ==================== Matches ==================== */
.matches-section { margin: 24px 0 48px; }
.section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.section-header h2 { font-size: 20px; font-weight: 600; color: var(--gray-800); }
.filter-select {
    padding: 8px 16px; border: 1px solid var(--gray-200); border-radius: var(--radius-sm);
    background: var(--bg-card); font-size: 14px; color: var(--gray-700); cursor: pointer; transition: var(--transition);
}
.filter-select:hover { border-color: var(--primary-500); }
.filter-select:focus { outline: none; border-color: var(--primary-500); box-shadow: 0 0 0 3px rgba(30,71,133,0.1); }

.matches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }

.match-card {
    background: var(--bg-card); border-radius: var(--radius-lg); padding: 20px;
    box-shadow: var(--shadow-md); transition: var(--transition); cursor: pointer;
    border: 1px solid transparent; position: relative; overflow: hidden;
}
.match-card::before {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--primary-500), var(--accent-gold));
    opacity: 0; transition: var(--transition);
}
.match-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-xl); border-color: var(--accent-gold-light); }
.match-card:hover::before { opacity: 1; }

.match-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.match-league {
    font-size: 12px; font-weight: 600; color: var(--primary-600);
    background: rgba(30,71,133,0.08); padding: 4px 10px; border-radius: var(--radius-xl);
}
.match-status { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-xl); font-weight: 500; }
.status-selling { background: rgba(16,185,129,0.1); color: var(--success); }
.status-drawn { background: rgba(100,116,139,0.1); color: var(--gray-500); }
.status-stopped { background: rgba(239,68,68,0.1); color: var(--danger); }

.match-teams-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.team-col { flex: 1; text-align: center; }
.team-col .t-name { font-size: 15px; font-weight: 600; color: var(--gray-800); display: block; margin-bottom: 4px; }
.team-col .t-label { font-size: 11px; color: var(--gray-400); }
.match-vs-col { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 0 12px; }
.vs-text { font-size: 12px; color: var(--gray-400); font-weight: 600; }
.handicap-tag { font-size: 11px; color: var(--primary-600); background: rgba(30,71,133,0.08); padding: 2px 8px; border-radius: var(--radius-sm); }

.match-sp { display: flex; gap: 8px; justify-content: center; }
.sp-item { flex: 1; text-align: center; padding: 10px 8px; background: var(--gray-50); border-radius: var(--radius-sm); transition: var(--transition); }
.sp-item:hover { background: rgba(30,71,133,0.05); }
.sp-label { font-size: 11px; color: var(--gray-500); display: block; margin-bottom: 4px; }
.sp-value { font-size: 18px; font-weight: 700; color: var(--primary-700); }

.match-time { text-align: center; font-size: 12px; color: var(--gray-500); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--gray-100); }

/* ==================== Loading & Empty ==================== */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 0; color: var(--gray-500); gap: 16px; }
.spinner { width: 40px; height: 40px; border: 3px solid var(--gray-200); border-top-color: var(--primary-500); border-radius: 50%; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 0; color: var(--gray-500); }
.empty-icon { font-size: 48px; display: block; margin-bottom: 16px; }

/* ==================== Modal ==================== */
.modal-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    z-index: 1000; display: none; align-items: center; justify-content: center; padding: 24px;
}
.modal-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.modal {
    background: var(--bg-card); border-radius: var(--radius-xl); width: 100%; max-width: 700px;
    max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow-xl); animation: slideUp 0.3s ease;
}
@keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

.modal-header {
    display: flex; justify-content: space-between; align-items: center; padding: 24px;
    border-bottom: 1px solid var(--gray-100); position: sticky; top: 0;
    background: var(--bg-card); z-index: 10; border-radius: var(--radius-xl) var(--radius-xl) 0 0;
}
.modal-title-group { display: flex; flex-direction: column; gap: 4px; }
.modal-league { font-size: 12px; color: var(--primary-600); font-weight: 600; }
.modal-title { font-size: 18px; font-weight: 600; color: var(--gray-800); }
.modal-close {
    width: 36px; height: 36px; border: none; background: var(--gray-100); border-radius: 50%;
    font-size: 20px; color: var(--gray-600); cursor: pointer; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { background: var(--gray-200); color: var(--gray-800); }
.modal-body { padding: 24px; }

.match-info-card {
    background: linear-gradient(135deg, var(--primary-800), var(--primary-600));
    border-radius: var(--radius-lg); padding: 24px; color: white; margin-bottom: 20px;
}
.modal-teams { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
.modal-team { text-align: center; flex: 1; }
.modal-team .mt-name { font-size: 18px; font-weight: 600; display: block; margin-bottom: 4px; }
.modal-team .mt-label { font-size: 12px; opacity: 0.7; }
.modal-center { text-align: center; padding: 0 20px; }
.modal-score { font-size: 28px; font-weight: 700; color: var(--accent-gold); }
.modal-handicap { font-size: 12px; opacity: 0.8; margin-top: 4px; }
.modal-meta { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 13px; opacity: 0.9; }
.status-badge { padding: 4px 12px; border-radius: var(--radius-xl); font-size: 12px; font-weight: 500; background: rgba(255,255,255,0.2); }

.sp-values-card { background: var(--gray-50); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
.sp-values-card h4 { font-size: 15px; font-weight: 600; color: var(--gray-700); margin-bottom: 16px; }
.sp-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 12px; }
.sp-grid-item {
    background: var(--bg-card); border-radius: var(--radius-md); padding: 12px 8px;
    text-align: center; box-shadow: var(--shadow-sm); transition: var(--transition);
}
.sp-grid-item:hover { transform: scale(1.05); box-shadow: var(--shadow-md); }
.sp-grid-label { font-size: 11px; color: var(--gray-500); display: block; margin-bottom: 6px; }
.sp-grid-value { font-size: 20px; font-weight: 700; color: var(--primary-700); }

.chart-card { background: var(--gray-50); border-radius: var(--radius-lg); padding: 20px; }
.chart-card h4 { font-size: 15px; font-weight: 600; color: var(--gray-700); margin-bottom: 16px; }
.chart-container { position: relative; height: 250px; }

/* ==================== Footer ==================== */
.footer { background: var(--primary-900); color: rgba(255,255,255,0.7); text-align: center; padding: 24px 0; margin-top: auto; }
.footer p { font-size: 13px; margin-bottom: 4px; }
.footer-note { font-size: 11px; opacity: 0.6; }

/* ==================== Responsive ==================== */
@media (max-width: 1024px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
    .container { padding: 0 16px; }
    .header-content { flex-direction: column; gap: 12px; }
    .logo-text h1 { font-size: 20px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    .stat-card { padding: 16px; }
    .stat-icon { width: 44px; height: 44px; font-size: 24px; }
    .stat-value { font-size: 22px; }
    .tab { padding: 10px 14px; font-size: 13px; }
    .tab-name { display: none; }
    .tab-icon { font-size: 18px; }
    .matches-grid { grid-template-columns: 1fr; }
    .section-header { flex-direction: column; gap: 12px; align-items: flex-start; }
    .filter-select { width: 100%; }
    .modal { margin: 12px; max-height: 95vh; }
    .modal-teams { flex-direction: column; gap: 16px; }
    .modal-center { padding: 12px 0; }
}
@media (max-width: 480px) {
    .stat-card { padding: 12px; }
    .stat-value { font-size: 20px; }
    .match-sp { flex-wrap: wrap; }
    .sp-item { min-width: calc(33% - 8px); }
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--gray-100); }
::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--gray-400); }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="circle circle-1"></div>
        <div class="circle circle-2"></div>
        <div class="circle circle-3"></div>
    </div>

    <header class="header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">⚽</span>
                    <div class="logo-text">
                        <h1>北京单场</h1>
                        <span class="subtitle">数据中心 · 实时SP值</span>
                    </div>
                </div>
                <div class="header-status">
                    <div class="status-dot"></div>
                    <span id="updateTime">加载中...</span>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-info"><span class="stat-value" id="totalMatches">-</span><span class="stat-label">总场次</span></div></div>
                    <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-info"><span class="stat-value" id="totalRecords">-</span><span class="stat-label">数据记录</span></div></div>
                    <div class="stat-card"><div class="stat-icon">⏱️</div><div class="stat-info"><span class="stat-value">60s</span><span class="stat-label">更新频率</span></div></div>
                    <div class="stat-card"><div class="stat-icon">🏆</div><div class="stat-info"><span class="stat-value">7</span><span class="stat-label">玩法类型</span></div></div>
                </div>
            </section>

            <section class="tabs-section">
                <div class="tabs-container">
                    <div class="tabs-wrapper" id="tabsWrapper">
                        <button class="tab active" data-game="200"><span class="tab-icon">⚽</span><span class="tab-name">胜平负</span></button>
                        <button class="tab" data-game="210"><span class="tab-icon">📈</span><span class="tab-name">上下盘</span></button>
                        <button class="tab" data-game="230"><span class="tab-icon">🥅</span><span class="tab-name">总进球</span></button>
                        <button class="tab" data-game="240"><span class="tab-icon">⏱️</span><span class="tab-name">半全场</span></button>
                        <button class="tab" data-game="250"><span class="tab-icon">🎯</span><span class="tab-name">单场比分</span></button>
                        <button class="tab" data-game="260"><span class="tab-icon">📝</span><span class="tab-name">下半场比分</span></button>
                        <button class="tab" data-game="270"><span class="tab-icon">🏅</span><span class="tab-name">胜负过关</span></button>
                    </div>
                </div>
            </section>

            <section class="matches-section">
                <div class="section-header">
                    <h2 id="sectionTitle">胜平负 · 即时SP值</h2>
                    <div class="filter-group">
                        <select id="statusFilter" class="filter-select">
                            <option value="all">全部状态</option>
                            <option value="销售中">销售中</option>
                            <option value="已开奖">已开奖</option>
                            <option value="已停售">已停售</option>
                        </select>
                    </div>
                </div>
                <div class="matches-grid" id="matchesGrid"></div>
                <div class="loading" id="loading"><div class="spinner"></div><span>加载数据中...</span></div>
                <div class="empty-state" id="emptyState" style="display:none;"><span class="empty-icon">📭</span><p>暂无数据</p></div>
            </section>
        </div>
    </main>

    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title-group"><span class="modal-league" id="modalLeague">-</span><h3 class="modal-title" id="modalTitle">比赛详情</h3></div>
                <button class="modal-close" id="modalClose">&times;</button>
            </div>
            <div class="modal-body">
                <div class="match-info-card">
                    <div class="modal-teams">
                        <div class="modal-team"><span class="mt-name" id="modalHomeTeam">主队</span><span class="mt-label">主队</span></div>
                        <div class="modal-center"><div class="modal-score" id="modalScore">VS</div><div class="modal-handicap" id="modalHandicap">让球: 0</div></div>
                        <div class="modal-team"><span class="mt-name" id="modalAwayTeam">客队</span><span class="mt-label">客队</span></div>
                    </div>
                    <div class="modal-meta"><span id="modalTime">-</span><span id="modalStatus" class="status-badge">-</span></div>
                </div>
                <div class="sp-values-card"><h4>当前SP值</h4><div class="sp-grid" id="modalSpValues"></div></div>
                <div class="chart-card"><h4>SP值变化趋势</h4><div class="chart-container"><canvas id="spChart"></canvas></div></div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>数据来源：北京体彩官方网站 · 仅供参考</p>
            <p class="footer-note">即时SP值随购彩者投注结果浮动，实际奖金以开奖SP值为准</p>
        </div>
    </footer>

<script>
// ==================== 配置 ====================
const CONFIG = {
    // API地址 - Cloudflare代理后自动HTTPS
    API_BASE: 'https://api.dawn.us.ci',
    UPDATE_INTERVAL: 60000,
    GAME_NAMES: { 200:'胜平负', 210:'上下盘单双数', 230:'总进球数', 240:'半全场胜平负', 250:'单场比分', 260:'下半场比分', 270:'胜负过关' },
    SP_LABELS: {
        200:['胜','平','负'],
        210:['上盘','下盘','单','双'],
        230:['0球','1球','2球','3球','4球','5球','6球','7+球'],
        240:['胜胜','胜平','胜负','平胜','平平','平负','负胜','负平','负负'],
        250:[], 260:[], 270:['胜','负']
    }
};

let currentGameId = 200;
let matchesData = [];
let spChart = null;

const $ = id => document.getElementById(id);

// ==================== 初始化 ====================
document.addEventListener('DOMContentLoaded', () => {
    initTabs();
    $('statusFilter').addEventListener('change', renderMatches);
    $('modalClose').addEventListener('click', closeModal);
    $('detailModal').addEventListener('click', e => { if (e.target === $('detailModal')) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
    loadData();
    setInterval(loadData, CONFIG.UPDATE_INTERVAL);
});

function initTabs() {
    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentGameId = parseInt(tab.dataset.game);
            $('sectionTitle').textContent = `${CONFIG.GAME_NAMES[currentGameId]} · 即时SP值`;
            loadData();
        });
    });
}

// ==================== 数据加载 ====================
async function loadData() {
    $('loading').style.display = 'flex';
    $('emptyState').style.display = 'none';
    try {
        const [spResp, statsResp] = await Promise.all([
            fetch(`${CONFIG.API_BASE}/api/sp/latest?game_id=${currentGameId}`),
            fetch(`${CONFIG.API_BASE}/api/stats`)
        ]);
        const spData = await spResp.json();
        const statsData = await statsResp.json();
        if (spData.code === 0) { matchesData = spData.data || []; renderMatches(); }
        if (statsData.code === 0) updateStats(statsData.data);
        $('updateTime').textContent = `最后更新: ${new Date().toLocaleTimeString()}`;
    } catch (err) {
        console.error('加载失败:', err);
        $('loading').style.display = 'none';
        $('matchesGrid').innerHTML = '<div class="empty-state"><span class="empty-icon">⚠️</span><p>数据加载失败，请检查网络连接</p></div>';
    }
}

function updateStats(stats) {
    let total = 0;
    Object.values(stats).forEach(g => { total += (g.sp_records||0) + (g.result_records||0); });
    $('totalMatches').textContent = matchesData.length;
    $('totalRecords').textContent = total >= 10000 ? (total/10000).toFixed(1)+'万' : total;
}

// ==================== 渲染比赛列表 ====================
function renderMatches() {
    const filter = $('statusFilter').value;
    let data = filter === 'all' ? matchesData : matchesData.filter(m => m.status === filter);
    if (!data.length) { $('matchesGrid').innerHTML = ''; $('emptyState').style.display = 'block'; $('loading').style.display = 'none'; return; }
    $('emptyState').style.display = 'none'; $('loading').style.display = 'none';
    $('matchesGrid').innerHTML = data.map(m => cardHTML(m)).join('');
    document.querySelectorAll('.match-card').forEach(card => {
        card.addEventListener('click', () => {
            const m = matchesData.find(d => d.match_no == card.dataset.id);
            if (m) openModal(m);
        });
    });
}

function cardHTML(m) {
    const sp = JSON.parse(m.sp_data||'[]');
    const labels = CONFIG.SP_LABELS[currentGameId]||[];
    const sc = m.status==='销售中'?'status-selling':m.status==='已开奖'?'status-drawn':'status-stopped';
    const sps = (currentGameId===250||currentGameId===260)
        ? sp.slice(0,4).map((v,i)=>`<div class="sp-item"><span class="sp-label">${v>0?'选项'+(i+1):'-'}</span><span class="sp-value">${v>0?v.toFixed(2):'-'}</span></div>`).join('')
        : sp.map((v,i)=>`<div class="sp-item"><span class="sp-label">${labels[i]||'选项'+(i+1)}</span><span class="sp-value">${v>0?v.toFixed(2):'-'}</span></div>`).join('');
    return `<div class="match-card" data-id="${m.match_no}">
        <div class="match-card-header"><span class="match-league">${m.league||'-'}</span><span class="match-status ${sc}">${m.status||'-'}</span></div>
        <div class="match-teams-row">
            <div class="team-col"><span class="t-name">${m.host_team||'主队'}</span><span class="t-label">主队</span></div>
            <div class="match-vs-col"><span class="vs-text">VS</span><span class="handicap-tag">让 ${m.handicap||'0'}</span></div>
            <div class="team-col"><span class="t-name">${m.guest_team||'客队'}</span><span class="t-label">客队</span></div>
        </div>
        <div class="match-sp">${sps}</div>
        <div class="match-time">场次 ${m.match_no} · ${m.match_time||'-'}</div>
    </div>`;
}

// ==================== 详情弹窗 ====================
async function openModal(m) {
    const sp = JSON.parse(m.sp_data||'[]');
    const labels = CONFIG.SP_LABELS[currentGameId]||[];
    $('modalLeague').textContent = m.league||'-';
    $('modalTitle').textContent = `场次 ${m.match_no}`;
    $('modalHomeTeam').textContent = m.host_team||'主队';
    $('modalAwayTeam').textContent = m.guest_team||'客队';
    $('modalScore').textContent = m.score||'VS';
    $('modalHandicap').textContent = `让球: ${m.handicap||'0'}`;
    $('modalTime').textContent = m.match_time||'-';
    $('modalStatus').textContent = m.status||'-';
    $('modalSpValues').innerHTML = sp.map((v,i)=>`<div class="sp-grid-item"><span class="sp-grid-label">${labels[i]||'选项'+(i+1)}</span><span class="sp-grid-value">${v>0?v.toFixed(2):'-'}</span></div>`).join('');
    $('detailModal').classList.add('active');
    document.body.style.overflow = 'hidden';
    await loadSpHistory(m);
}

async function loadSpHistory(m) {
    try {
        const resp = await fetch(`${CONFIG.API_BASE}/api/sp/history?game_id=${currentGameId}&draw_no=${m.draw_no}&match_no=${m.match_no}&hours=48`);
        const data = await resp.json();
        if (data.code===0 && data.data.length) renderChart(data.data); else renderEmptyChart();
    } catch { renderEmptyChart(); }
}

function renderChart(history) {
    const labels = CONFIG.SP_LABELS[currentGameId]||[];
    const times = history.map(d => new Date(d.scraped_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    const spArr = history.map(d => JSON.parse(d.sp_data||'[]'));
    const validIdx = [];
    if (spArr.length) spArr[0].forEach((v,i) => { if (v>0) validIdx.push(i); });
    const colors = ['rgb(59,130,246)','rgb(239,68,68)','rgb(16,185,129)','rgb(245,158,11)','rgb(139,92,246)','rgb(236,72,153)','rgb(20,184,166)','rgb(249,115,22)','rgb(99,102,241)'];
    const datasets = validIdx.map((idx,i) => ({
        label: labels[idx]||`选项${idx+1}`, data: spArr.map(sp=>sp[idx]||null),
        borderColor: colors[i%colors.length], backgroundColor: colors[i%colors.length]+'20',
        tension: 0.4, fill: true, pointRadius: 3, pointHoverRadius: 6
    }));
    if (spChart) spChart.destroy();
    spChart = new Chart($('spChart'), {
        type: 'line', data: { labels: times, datasets },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { mode: 'index', intersect: false },
            plugins: { legend: { position: 'bottom', labels: { padding: 15, usePointStyle: true } }, tooltip: { backgroundColor: 'rgba(15,23,42,0.9)', padding: 12, cornerRadius: 8 } },
            scales: { x: { grid: { display: false }, ticks: { maxTicksLimit: 10 } }, y: { grid: { color: 'rgba(0,0,0,0.05)' } } }
        }
    });
}

function renderEmptyChart() {
    if (spChart) spChart.destroy();
    spChart = new Chart($('spChart'), {
        type: 'line', data: { labels: ['暂无数据'], datasets: [{ label: 'SP值', data: [0], borderColor: 'rgb(203,213,225)', backgroundColor: 'rgba(203,213,225,0.1)' }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
    });
}

function closeModal() {
    $('detailModal').classList.remove('active');
    document.body.style.overflow = '';
    if (spChart) { spChart.destroy(); spChart = null; }
}
</script>
</body>
</html>
