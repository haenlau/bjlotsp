<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北京单场数据中心</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
:root{--p900:#0a1628;--p800:#0f2240;--p700:#152d52;--p600:#1a3a6b;--p500:#1e4785;--gold:#f0b429;--gold-l:#f7d070;--ok:#10b981;--warn:#f59e0b;--err:#ef4444;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;--g400:#94a3b8;--g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--bg:#f0f4f8;--card:#fff;--glass:rgba(255,255,255,.85);--sh1:0 1px 2px rgba(0,0,0,.05);--sh2:0 4px 6px -1px rgba(0,0,0,.1);--sh3:0 10px 15px -3px rgba(0,0,0,.1);--sh4:0 20px 25px -5px rgba(0,0,0,.1);--r1:8px;--r2:12px;--r3:16px;--r4:24px;--tr:all .3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--g800);line-height:1.6;min-height:100vh}
.wrap{max-width:1400px;margin:0 auto;padding:0 20px}
.bg-fix{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.bg-fix .c{position:absolute;border-radius:50%;background:linear-gradient(135deg,var(--p500),var(--gold));opacity:.03}
.bg-fix .c1{width:600px;height:600px;top:-200px;right:-100px}
.bg-fix .c2{width:400px;height:400px;bottom:-100px;left:-50px}
.hdr{position:sticky;top:0;z-index:100;background:var(--glass);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.2);box-shadow:var(--sh1)}
.hdr-in{display:flex;justify-content:space-between;align-items:center;padding:14px 0}
.logo{display:flex;align-items:center;gap:12px}
.logo i{font-size:32px}
.logo h1{font-size:22px;font-weight:700;background:linear-gradient(135deg,var(--p700),var(--p500));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo small{font-size:11px;color:var(--g500);display:block}
.hdr-r{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--g600);background:var(--card);padding:6px 14px;border-radius:var(--r4);box-shadow:var(--sh1)}
.dot{width:8px;height:8px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.info-bar{display:flex;gap:12px;margin:16px 0;flex-wrap:wrap}
.info-tag{background:var(--card);padding:8px 16px;border-radius:var(--r2);font-size:13px;color:var(--g600);box-shadow:var(--sh1);display:flex;align-items:center;gap:6px}
.info-tag b{color:var(--p700);font-weight:600}
.tabs{background:var(--card);border-radius:var(--r3);padding:6px;box-shadow:var(--sh2);margin:16px 0;overflow-x:auto}
.tabs-in{display:flex;gap:6px;min-width:max-content}
.tab{display:flex;align-items:center;gap:6px;padding:10px 16px;border:none;background:0;border-radius:var(--r2);cursor:pointer;font-size:13px;font-weight:500;color:var(--g600);transition:var(--tr);white-space:nowrap}
.tab:hover{background:var(--g100)}
.tab.on{background:linear-gradient(135deg,var(--p700),var(--p500));color:#fff;box-shadow:0 4px 12px rgba(30,71,133,.3)}
.tab i{font-size:15px}
.filters{display:flex;gap:10px;margin:16px 0;flex-wrap:wrap;align-items:center}
.sel{padding:8px 14px;border:1px solid var(--g200);border-radius:var(--r1);background:var(--card);font-size:13px;color:var(--g700);cursor:pointer}
.sel:focus{outline:none;border-color:var(--p500)}
.section-t{font-size:18px;font-weight:600;color:var(--g800)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;margin:16px 0 40px}
.card{background:var(--card);border-radius:var(--r3);padding:18px;box-shadow:var(--sh2);transition:var(--tr);cursor:pointer;border:1px solid transparent;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--p500),var(--gold));opacity:0;transition:var(--tr)}
.card:hover{transform:translateY(-3px);box-shadow:var(--sh4);border-color:var(--gold-l)}
.card:hover::before{opacity:1}
.card-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.league{font-size:11px;font-weight:600;color:var(--p600);background:rgba(30,71,133,.08);padding:3px 8px;border-radius:var(--r4)}
.badge{font-size:11px;padding:3px 8px;border-radius:var(--r4);font-weight:500}
.badge-ok{background:rgba(16,185,129,.1);color:var(--ok)}
.badge-off{background:rgba(100,116,139,.1);color:var(--g500)}
.badge-stop{background:rgba(239,68,68,.1);color:var(--err)}
.teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.team{flex:1;text-align:center}
.team .tn{font-size:14px;font-weight:600;color:var(--g800);display:block}
.team .tl{font-size:10px;color:var(--g400)}
.vs-col{display:flex;flex-direction:column;align-items:center;gap:3px;padding:0 10px}
.vs-col .vs{font-size:11px;color:var(--g400);font-weight:600}
.vs-col .hq{font-size:10px;color:var(--p600);background:rgba(30,71,133,.08);padding:2px 6px;border-radius:var(--r1)}
.sp-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.sp-it{min-width:60px;flex:1;text-align:center;padding:8px 6px;background:var(--g50);border-radius:var(--r1);transition:var(--tr)}
.sp-it:hover{background:rgba(30,71,133,.05)}
.sp-it .sl{font-size:10px;color:var(--g500);display:block;margin-bottom:2px}
.sp-it .sv{font-size:16px;font-weight:700;color:var(--p700)}
.card-ft{text-align:center;font-size:11px;color:var(--g500);margin-top:10px;padding-top:10px;border-top:1px solid var(--g100)}
.load{text-align:center;padding:60px 0;color:var(--g500)}
.spin{width:36px;height:36px;border:3px solid var(--g200);border-top-color:var(--p500);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:60px 0;color:var(--g500)}
.empty i{font-size:40px;display:block;margin-bottom:12px}
.err-info{font-size:12px;color:var(--g400);margin-top:8px;line-height:1.8}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.on{display:flex;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--card);border-radius:var(--r4);width:100%;max-width:680px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh4);animation:slideUp .3s}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-hd{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid var(--g100);position:sticky;top:0;background:var(--card);z-index:10}
.modal-hd h3{font-size:16px;font-weight:600}
.modal-hd .league-tag{font-size:11px;color:var(--p600);font-weight:600}
.close-btn{width:32px;height:32px;border:none;background:var(--g100);border-radius:50%;font-size:18px;color:var(--g600);cursor:pointer}
.close-btn:hover{background:var(--g200)}
.modal-bd{padding:20px}
.m-info{background:linear-gradient(135deg,var(--p800),var(--p600));border-radius:var(--r3);padding:20px;color:#fff;margin-bottom:16px}
.m-teams{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.m-team{text-align:center;flex:1}
.m-team .mt{font-size:17px;font-weight:600;display:block}
.m-team .ml{font-size:11px;opacity:.7}
.m-center{text-align:center;padding:0 16px}
.m-score{font-size:26px;font-weight:700;color:var(--gold)}
.m-hq{font-size:11px;opacity:.8;margin-top:3px}
.m-meta{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid rgba(255,255,255,.2);font-size:12px;opacity:.9}
.sp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(75px,1fr));gap:10px}
.sp-gi{background:var(--g50);border-radius:var(--r2);padding:10px 6px;text-align:center;box-shadow:var(--sh1);transition:var(--tr)}
.sp-gi:hover{transform:scale(1.05)}
.sp-gi .sgl{font-size:10px;color:var(--g500);display:block;margin-bottom:4px}
.sp-gi .sgv{font-size:18px;font-weight:700;color:var(--p700)}
.chart-box{background:var(--g50);border-radius:var(--r3);padding:16px;margin-top:16px}
.chart-box h4{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:12px}
.chart-wrap{position:relative;height:220px}
.sub-title{font-size:14px;font-weight:600;color:var(--g700);margin-bottom:12px}
.ftr{background:var(--p900);color:rgba(255,255,255,.7);text-align:center;padding:20px 0;margin-top:auto}
.ftr p{font-size:12px;margin-bottom:3px}
@media(max-width:768px){.hdr-in{flex-direction:column;gap:8px}.tab{padding:8px 12px;font-size:12px}.tab span{display:none}.grid{grid-template-columns:1fr}.modal{margin:10px;max-height:95vh}.m-teams{flex-direction:column;gap:12px}.m-center{padding:8px 0}}
    </style>
</head>
<body>
<div class="bg-fix"><div class="c c1"></div><div class="c c2"></div></div>
<header class="hdr"><div class="wrap"><div class="hdr-in">
    <div class="logo"><i>⚽</i><div><h1>北京单场</h1><small>数据中心 · 实时SP值</small></div></div>
    <div class="hdr-r"><div class="dot"></div><span id="updTime">加载中...</span></div>
</div></div></header>
<main class="wrap">
    <div class="info-bar" id="infoBar">
        <div class="info-tag">📊 奖期: <b id="drawNo">-</b></div>
        <div class="info-tag">🏟️ 场次: <b id="matchCount">-</b></div>
        <div class="info-tag">🟢 销售中: <b id="sellingCount">-</b></div>
        <div class="info-tag">🔗 API: <b id="apiStatus">-</b></div>
    </div>
    <div class="tabs"><div class="tabs-in" id="tabs"></div></div>
    <div class="filters">
        <span class="section-t" id="secTitle">胜平负 · 即时SP值</span>
        <div style="flex:1"></div>
        <select class="sel" id="leagueFilter"><option value="all">全部赛事</option></select>
        <select class="sel" id="statusFilter"><option value="all">全部状态</option><option value="销售中">销售中</option><option value="已开奖">已开奖</option><option value="已停售">已停售</option></select>
    </div>
    <div class="grid" id="grid"></div>
    <div class="load" id="loading"><div class="spin"></div><span>加载中...</span></div>
    <div class="empty" id="empty" style="display:none"><i>📭</i><p id="emptyMsg">暂无数据</p></div>
</main>
<div class="modal-bg" id="modal">
    <div class="modal">
        <div class="modal-hd"><div><div class="league-tag" id="mLeague"></div><h3 id="mTitle"></h3></div><button class="close-btn" id="mClose">&times;</button></div>
        <div class="modal-bd">
            <div class="m-info">
                <div class="m-teams">
                    <div class="m-team"><span class="mt" id="mHome"></span><span class="ml">主队</span></div>
                    <div class="m-center"><div class="m-score" id="mScore">VS</div><div class="m-hq" id="mHandicap"></div></div>
                    <div class="m-team"><span class="mt" id="mAway"></span><span class="ml">客队</span></div>
                </div>
                <div class="m-meta"><span id="mTime"></span><span id="mStatus"></span></div>
            </div>
            <div class="sub-title">当前SP值</div>
            <div class="sp-grid" id="mSp"></div>
            <div class="chart-box"><h4>SP值变化趋势</h4><div class="chart-wrap"><canvas id="chart"></canvas></div></div>
        </div>
    </div>
</div>
<footer class="ftr"><div class="wrap"><p>数据来源：北京体彩官方网站 · 仅供参考</p><p style="font-size:10px;opacity:.5">即时SP值随投注结果浮动，实际奖金以开奖SP值为准</p></div></footer>
<script>
const API='https://api.dawn.us.ci:8899';
const GAMES={200:{name:'胜平负',icon:'⚽'},210:{name:'上下盘',icon:'📈'},230:{name:'总进球',icon:'🥅'},240:{name:'半全场',icon:'⏱️'},250:{name:'单场比分',icon:'🎯'},260:{name:'下半场比分',icon:'📝'},270:{name:'胜负过关',icon:'🏅'}};
let curGame=200,curData=null,myChart=null;
const $=id=>document.getElementById(id);

document.addEventListener('DOMContentLoaded',()=>{
    renderTabs();
    $('statusFilter').onchange=renderCards;
    $('leagueFilter').onchange=renderCards;
    $('mClose').onclick=closeModal;
    $('modal').onclick=e=>{if(e.target===$('modal'))closeModal()};
    document.onkeydown=e=>{if(e.key==='Escape')closeModal()};
    loadAll();
    setInterval(loadAll,30000);
});

function renderTabs(){
    $('tabs').innerHTML=Object.entries(GAMES).map(([id,g])=>
        `<button class="tab${id==curGame?' on':''}" data-g="${id}"><i>${g.icon}</i><span>${g.name}</span></button>`
    ).join('');
    $('tabs').querySelectorAll('.tab').forEach(t=>{
        t.onclick=()=>{
            $('tabs').querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
            t.classList.add('on');
            curGame=+t.dataset.g;
            $('secTitle').textContent=GAMES[curGame].name+' · 即时SP值';
            loadAll();
        };
    });
}

async function loadAll(){
    $('loading').style.display='block';
    $('empty').style.display='none';
    try{
        const[spR,statsR]=await Promise.all([
            fetch(`${API}/api/sp/latest?game_id=${curGame}`),
            fetch(`${API}/api/stats`)
        ]);
        const sp=await spR.json();
        const stats=await statsR.json();

        if(sp.code===0){
            curData=sp;
            $('drawNo').textContent=sp.draw_no||'-';
            $('matchCount').textContent=sp.count||0;
            buildLeagueFilter(sp.data||[]);
            renderCards();
        }
        if(stats.code===0){
            const g=stats.data[curGame];
            if(g){
                $('sellingCount').textContent=g.selling_count||0;
            }
        }
        $('apiStatus').textContent='✅ 正常';
        $('apiStatus').style.color='var(--ok)';
        $('updTime').textContent='更新: '+new Date().toLocaleTimeString();
    }catch(e){
        console.error(e);
        $('loading').style.display='none';
        $('apiStatus').textContent='❌ 异常';
        $('apiStatus').style.color='var(--err)';
        $('grid').innerHTML=`<div class="empty"><i>⚠️</i><p>加载失败</p><div class="err-info">API: ${API}<br>${e.message}</div></div>`;
    }
}

function buildLeagueFilter(records){
    const leagues=[...new Set(records.map(m=>m.league).filter(Boolean))].sort();
    const sel=$('leagueFilter');
    const cur=sel.value;
    sel.innerHTML='<option value="all">全部赛事</option>'+leagues.map(l=>`<option value="${l}">${l}</option>`).join('');
    sel.value=cur||'all';
}

function renderCards(){
    if(!curData)return;
    let data=curData.data||[];
    const sf=$('statusFilter').value;
    const lf=$('leagueFilter').value;
    if(sf!=='all')data=data.filter(m=>m.status===sf);
    if(lf!=='all')data=data.filter(m=>m.league===lf);
    $('loading').style.display='none';
    if(!data.length){$('grid').innerHTML='';$('empty').style.display='block';$('emptyMsg').textContent=sf!=='all'||lf!=='all'?'没有符合条件的比赛':'暂无数据';return}
    $('empty').style.display='none';
    $('grid').innerHTML=data.map(m=>cardHTML(m)).join('');
    $('grid').querySelectorAll('.card').forEach(c=>{
        c.onclick=()=>{
            const m=(curData.data||[]).find(d=>d.match_no==c.dataset.id);
            if(m)openModal(m);
        };
    });
}

function spObjToPairs(sp){
    // sp = {胜: 1.93, 平: 3.36, 负: 3.67} => [{label, value}, ...]
    if(!sp||typeof sp!=='object')return[];
    return Object.entries(sp).map(([k,v])=>({label:k,value:v}));
}

function cardHTML(m){
    const pairs=spObjToPairs(m.sp);
    const bc=m.status==='销售中'?'badge-ok':m.status==='已开奖'?'badge-off':'badge-stop';
    const hq=m.handicap&&m.handicap!=='0'?`让 ${m.handicap}`:'非让球';
    const sps=pairs.slice(0,6).map(p=>`<div class="sp-it"><span class="sl">${p.label}</span><span class="sv">${p.value>0?p.value.toFixed(2):'-'}</span></div>`).join('');
    return `<div class="card" data-id="${m.match_no}">
        <div class="card-hd"><span class="league">${m.league||'-'}</span><span class="badge ${bc}">${m.status||'-'}</span></div>
        <div class="teams">
            <div class="team"><span class="tn">${m.host_team||'主队'}</span><span class="tl">主队</span></div>
            <div class="vs-col"><span class="vs">VS</span><span class="hq">${hq}</span></div>
            <div class="team"><span class="tn">${m.guest_team||'客队'}</span><span class="tl">客队</span></div>
        </div>
        <div class="sp-row">${sps}</div>
        <div class="card-ft">场次 ${m.match_no} · ${m.match_time||'-'}</div>
    </div>`;
}

async function openModal(m){
    const pairs=spObjToPairs(m.sp);
    $('mLeague').textContent=m.league||'-';
    $('mTitle').textContent='场次 '+m.match_no;
    $('mHome').textContent=m.host_team||'主队';
    $('mAway').textContent=m.guest_team||'客队';
    $('mScore').textContent=m.score||'VS';
    $('mHandicap').textContent=m.handicap&&m.handicap!=='0'?'让球: '+m.handicap:'非让球';
    $('mTime').textContent=m.match_time||'-';
    $('mStatus').textContent=m.status||'-';
    $('mSp').innerHTML=pairs.map(p=>`<div class="sp-gi"><span class="sgl">${p.label}</span><span class="sgv">${p.value>0?p.value.toFixed(2):'-'}</span></div>`).join('');
    $('modal').classList.add('on');
    document.body.style.overflow='hidden';
    try{
        const r=await fetch(`${API}/api/sp/history?game_id=${curGame}&match_no=${m.match_no}&hours=48`);
        const d=await r.json();
        if(d.code===0&&d.data.length)renderChart(d.data);else emptyChart();
    }catch{emptyChart();}
}

function renderChart(hist){
    const ts=hist.map(d=>new Date(d.scraped_at).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'}));
    // 从所有历史记录中收集所有SP列名
    const allKeys=new Set();
    hist.forEach(h=>{if(h.sp&&typeof h.sp==='object')Object.keys(h.sp).forEach(k=>allKeys.add(k))});
    const keys=[...allKeys];
    const colors=['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6','#ec4899','#14b8a6','#f97316','#6366f1'];
    const ds=keys.map((k,i)=>({
        label:k,
        data:hist.map(h=>h.sp&&h.sp[k]?h.sp[k]:null),
        borderColor:colors[i%colors.length],
        backgroundColor:colors[i%colors.length]+'20',
        tension:.4,fill:true,pointRadius:2,pointHoverRadius:5
    }));
    if(myChart)myChart.destroy();
    myChart=new Chart($('chart'),{type:'line',data:{labels:ts,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'bottom',labels:{padding:12,usePointStyle:true}},tooltip:{backgroundColor:'rgba(15,23,42,.9)',padding:10,cornerRadius:8}},scales:{x:{grid:{display:false},ticks:{maxTicksLimit:8,font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.05)'}}}}});
}
function emptyChart(){if(myChart)myChart.destroy();myChart=new Chart($('chart'),{type:'line',data:{labels:['暂无'],datasets:[{data:[0],borderColor:'#cbd5e1',backgroundColor:'rgba(203,213,225,.1)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});}
function closeModal(){$('modal').classList.remove('on');document.body.style.overflow='';if(myChart){myChart.destroy();myChart=null;}}
</script>
</body>
</html>
